<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-label="Alphacar Kubernetes multi-cloud platform diagram">
  <rect width="720" height="360" rx="18" fill="#07111f"/>
  <rect x="28" y="28" width="664" height="304" rx="14" fill="#0f172a" stroke="#1e3a8a"/>
  <text x="44" y="58" fill="#38bdf8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="700">Alphacar Kubernetes Platform</text>
  <text x="44" y="84" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">Multi-cloud MSA with GitOps and AI-driven observability</text>

  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700">
    <rect x="52" y="118" width="140" height="62" rx="10" fill="#082f49" stroke="#38bdf8"/>
    <text x="76" y="145" fill="#e0f2fe">Next.js App</text>
    <text x="76" y="164" fill="#7dd3fc" font-size="11">frontend</text>

    <rect x="290" y="112" width="158" height="74" rx="10" fill="#064e3b" stroke="#34d399"/>
    <text x="315" y="141" fill="#dcfce7">NestJS Services</text>
    <text x="315" y="161" fill="#86efac" font-size="11">main, ai, news, quote</text>

    <rect x="526" y="118" width="126" height="62" rx="10" fill="#312e81" stroke="#818cf8"/>
    <text x="552" y="145" fill="#eef2ff">Datastores</text>
    <text x="552" y="164" fill="#c4b5fd" font-size="11">MongoDB / Redis</text>
  </g>

  <path d="M196 149 H286" stroke="#38bdf8" stroke-width="2" stroke-dasharray="6 6"/>
  <path d="M452 149 H522" stroke="#34d399" stroke-width="2" stroke-dasharray="6 6"/>

  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">
