    <text x="72" y="247" fill="#f8fafc" font-weight="700">AWS EKS + GCP GKE</text>
    <text x="72" y="266" fill="#94a3b8">Kubernetes, Helm, VPN</text>

    <rect x="270" y="220" width="180" height="62" rx="10" fill="#111827" stroke="#475569"/>
    <text x="290" y="247" fill="#f8fafc" font-weight="700">GitOps / IaC</text>
    <text x="290" y="266" fill="#94a3b8">ArgoCD, Terraform, Harbor</text>

    <rect x="488" y="220" width="164" height="62" rx="10" fill="#111827" stroke="#475569"/>
