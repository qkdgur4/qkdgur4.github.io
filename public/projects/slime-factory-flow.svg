    <path d="m466 168 14 10-14 10" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
    <rect x="492" y="136" width="150" height="84" rx="12" fill="#1e293b" stroke="#60a5fa"/>
